<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
</head>
<body>
    <h3>Sign up here</h3>
    <form>
        <b>Username:</b><input type="text" placeholder="Enter your Username"><br><br>
        <b>Email Id:</b><input type="email" placeholder="Enter your Email id"><br><br>
        <b>Password:</b><input type="password" placeholder="Enter your Password"><br><br>
        <b>Gender:</b>
            <input type="radio" name="g"> Male
            <input type="radio" name="g"> Female<br><br>
        <b>DOB:</b> <input type="date"><br><br>
        <b>Phone number:</b> <input type="tel" placeholder="Enter your contact number"><br><br>
        <b>Country:</b>
            <select>
                <option>Select your Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Australia</option>
            </select><br><hr>
        <b>Languages Known:</b>
            <input type="checkbox" checked> English
            <input type="checkbox"> Hindi
            <input type="checkbox"> Telugu<br><br>
        <b>Profile pic:</b><input type="file"><br><br>
        <b>About yourself:</b><br>
            <textarea rows="4" cols="35"></textarea><br><br>
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
